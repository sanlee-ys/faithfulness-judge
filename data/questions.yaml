      url: "https://www.dvidshub.net/news/394247/101st-airborne-deploy-soldiers-short-notice-exercise"
    text: |
      The 101st Airborne Division (Air Assault) will deploy approximately 160
      Soldiers to Fort Knox, Kentucky, in support of an Emergency Deployment
      Readiness Exercise (EDRE) to be held there. The Soldiers, from the
      division's 2nd Brigade Combat Team, are projected to deploy Tuesday,
      Apr. 20.
    questions:
      - id: q-11
        type: grounded
        question: "How many Soldiers will the 101st Airborne deploy for the EDRE, and to where?"
        note: "Supported: approximately 160 Soldiers, from the 2nd Brigade Combat Team, to Fort Knox, Kentucky."
      - id: q-12
        type: partial
        question: "How long will the Emergency Deployment Readiness Exercise last?"
        note: "The excerpt gives a deploy date but no duration. Any length is unsupported."
      - id: q-13
        type: false_premise
        question: "Why was the exercise moved from Fort Campbell to Fort Knox?"
        note: "False premise: the excerpt says only that the Soldiers deploy to Fort Knox; it mentions no move from another post."

