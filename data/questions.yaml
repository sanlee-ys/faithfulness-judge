  - id: ctx-06
    category: procurement
    domain: cyber
    source:
      outlet: DVIDS
      id: "509198"
      title: "DOD Awards First Joint Licensing Agreement"
      url: "https://www.dvidshub.net/news/509198/dod-awards-first-joint-licensing-agreement"
    text: |
      The Defense Department has leveraged the buying power of more than two
      million information technology users to award a three-year, $617 million
      joint enterprise license agreement for Microsoft products, defense
      officials announced. The deal, led by the Army Contracting Command in
      collaboration with the Defense Information Systems Agency, the Army and the
      Air Force, demonstrates the best pricing DOD has received to date for
      Microsoft desktop and server software licenses, officials said.
    questions:
      - id: q-17
        type: grounded
        question: "What is the term and value of the Microsoft licensing agreement, and how many IT users does it cover?"
        note: "Supported: three years, $617 million, more than two million IT users."
      - id: q-18
        type: grounded
        question: "Which organization led the agreement, and with whom?"
        note: "Supported: the Army Contracting Command, in collaboration with DISA, the Army, and the Air Force."
      - id: q-19
        type: partial
        question: "In absolute dollars, how much did DOD pay for the same licenses before this agreement?"
        note: "The excerpt says only that this is the best pricing 'to date'; it gives no prior absolute cost. Any figure is unsupported."
      - id: q-20
        type: false_premise
        question: "Which competing vendor did DOD reject in favor of Microsoft?"
        note: "False premise: the excerpt describes a Microsoft licensing agreement and mentions no competing vendor or competition."

  - id: ctx-07
    category: policy
    domain: space
    source:
      outlet: DVIDS
      id: "494043"
      title: "U.S. Space Force's Space Systems Command and Japan launch First Bilateral Space Effort"
      url: "https://www.dvidshub.net/news/494043/us-space-forces-space-systems-command-and-japan-launch-first-bilateral-space-effort"
    text: |
      A U.S. space domain awareness payload hosted on Japan's Quasi-Zenith
      Satellite 6 (QZS-6) successfully launched on a Japanese H-3 launch vehicle
      from the Yoshinobu Launch Complex at the Japan Aerospace Exploration
      Agency's (JAXA) Tanegashima Space Center (TNSC) in Japan on February 2,
      2025. This is the first bilateral U.S. Japan cooperative space effort
      focused on national security, and the first of two launches as part of the
      JAXA Quasi-Zenith Satellite System Hosted Payload (QZSS-HP) program.
    questions:
      - id: q-21
        type: grounded
        question: "What kind of U.S. payload launched, on what vehicle, and from where and when?"
        note: "Supported: a U.S. space domain awareness payload on QZS-6, on a Japanese H-3 vehicle, from Tanegashima Space Center, on February 2, 2025."
      - id: q-22
        type: grounded
        question: "What makes this launch significant?"
        note: "Supported: it is the first bilateral U.S.–Japan cooperative space effort focused on national security, and the first of two QZSS-HP launches."
      - id: q-23
        type: partial
        question: "On what date will the second QZSS-HP payload launch?"
        note: "The excerpt says there are two launches but gives no date for the second. A specific date is unsupported."

