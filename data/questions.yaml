  - id: ctx-09
    category: operations
    domain: cyber
    source:
      outlet: DVIDS
      id: "569922"
      title: "More than 1,000 Cyber Warriors Converge on Arkansas for Cyber Shield 2026"
      url: "https://www.dvidshub.net/news/569922/more-than-1000-cyber-warriors-converge-arkansas-cyber-shield-2026"
    text: |
      The Department of Defense has commenced Cyber Shield 2026, the largest and
      longest-running unclassified cyber defense exercise in the nation. Over
      1,000 participants from 44 states and territories and 23 international
      partners have gathered here at Camp Robinson to develop and test their
      defensive capabilities in real-world cyber scenarios–fortifying national
      security. The exercise, which runs from July 12-25, 2026, brings together
      military cyber warriors, civilian counterparts, and international allies to
      focus on protecting critical infrastructure, such as water and power
      grids.
    questions:
      - id: q-28
        type: grounded
        question: "How many participants, states/territories, and international partners are taking part in Cyber Shield 2026, and when does it run?"
        note: "Supported: over 1,000 participants, 44 states and territories, 23 international partners, July 12–25, 2026."
      - id: q-29
        type: partial
        question: "Which 23 international partners are participating?"
        note: "The excerpt gives the count (23) but names none. Any list is unsupported."
      - id: q-30
        type: unanswerable
        question: "What is the budget for Cyber Shield 2026?"
        note: "The excerpt gives no cost figure. Any budget is fabricated."

  - id: ctx-10
    category: procurement
    domain: sea
    source:
      outlet: DVIDS
      id: "519885"
      title: "New Navy Ship's Cost Overstated in News Reports, Official Says"
      url: "https://www.dvidshub.net/news/519885/new-navy-ships-cost-overstated-news-reports-official-says"
    text: |
      The projected unit cost of the next-generation U.S. Navy destroyer is much
      lower than the figures being cited in some news reports, a senior Defense
      Department official said here yesterday. The DDG-1000 is a high-tech,
      guided-missile destroyer that is envisioned to eventually replace the
      Arleigh Burke class of warships developed 30 years ago. The Pentagon would
      pay between $2.2 to $2.5 billion for each new DDG-1000 ship after the
      regular production line is up and running.
    questions:
      - id: q-31
        type: grounded
        question: "What per-ship unit cost does the official project for the DDG-1000 once production is running?"
        note: "Supported: between $2.2 and $2.5 billion per ship."
      - id: q-32
        type: grounded
        question: "What is the DDG-1000 intended to replace?"
        note: "Supported: the Arleigh Burke class of warships, developed 30 years ago."
      - id: q-33
        type: partial
        question: "Why did some news reports cite higher cost figures for the ship?"
        note: "The excerpt says reports cited higher figures but never explains why. Any reason is unsupported."
      - id: q-34
        type: false_premise
        question: "The official confirmed the $7 billion per-ship price — what drives a cost that high?"
        note: "False premise: the official said the unit cost ($2.2–$2.5B) is much lower than the figures in news reports, not $7 billion."

