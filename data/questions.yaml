# Densified question set — faithfulness-judge (floor version)
#
# Grounding contexts are real, public-domain U.S. military public affairs text
# from DVIDS (Defense Visual Information Distribution Service, dvidshub.net).
# Each passage is excerpted (occasionally lightly condensed) from the cited
# article; every context carries its source URL so any claim can be checked
# against the original. DVIDS works by U.S. government employees are public
# domain.
#
# The passage is the ONLY grounding a QA model is given, so "supported vs.
# unsupported" is defined strictly against the excerpt here — not against the
# full article and not against world knowledge. The set is "densified": most
# questions are deliberately under-grounded so a model answering from the
# excerpt alone is pushed to produce unsupported claims. See data/README.md for
# the taxonomy and the intended mix.

meta:
  version: floor-0.2
  synthetic: false
  source: "DVIDS (Defense Visual Information Distribution Service) — U.S. military public affairs, public domain"
  target_unsupported_claim_share: 0.40  # a target measured after answer-gen, not a guarantee
  densification_types: [grounded, partial, unanswerable, false_premise]

contexts:
  - id: ctx-01
    category: procurement
    domain: air
    source:
      outlet: DVIDS
      id: "569395"
      title: "JIATF-401 Awards $500 Million in Counter-UAS Contracts to Defend the Homeland"
      url: "https://www.dvidshub.net/news/569395/jiatf-401-awards-500-million-counter-uas-contracts-defend-homeland"
    text: |
      JIATF-401 awarded an Indefinite Delivery/Indefinite Quantity contract with
      a $500 million ceiling to increase counter unmanned aircraft systems
      (c-UAS capabilities) for warfighters and security personnel. These
      capabilities directly support Domestic Shield, a program led by JIATF-401
      to enhance counter drone defense in the homeland. AeroVironment, which was
      awarded the contract, will deliver a range of scalable c-UAS capabilities.
    questions:
      - id: q-01
        type: grounded
        question: "What is the ceiling of the contract JIATF-401 awarded, and which company received it?"
        note: "Supported: a $500 million ceiling IDIQ contract, awarded to AeroVironment."
      - id: q-02
        type: partial
        question: "What total value is the contract actually expected to reach?"
        note: "The excerpt gives only a $500 million ceiling, not an expected total. Any specific total is unsupported."
      - id: q-03
        type: false_premise
        question: "Which overseas theater will the awarded counter-drone capabilities support?"
        note: "False premise: the excerpt says the capabilities support Domestic Shield — counter-drone defense in the homeland — not an overseas theater."

  - id: ctx-02
    category: technology
    domain: air
    source:
      outlet: DVIDS
      id: "404317"
      title: "Apache Product Management Office conducts future technology demonstration"
      url: "https://www.dvidshub.net/news/404317/apache-product-management-office-conducts-future-technology-demonstration"
    text: |
      The event consisted of 23 flights on an AH-64E Version 6 Apache Attack
      Helicopter totaling 29.9 flight hours. The flights were conducted by 17
      pilots the RTC, 101st Airborne Division, and the Army Capability
      Management - Recon Attack. The flights included familiarization,
      evaluation, and survey flights with each pilot providing positive feedback
      on the demonstrated capability.
    questions:
      - id: q-04
        type: grounded
        question: "How many flights and flight hours did the demonstration involve, and on what aircraft?"
        note: "Supported: 23 flights, 29.9 flight hours, on an AH-64E Version 6 Apache."
      - id: q-05
        type: partial
        question: "How much did the demonstration program cost?"
        note: "No cost figure appears in the excerpt. Any dollar amount is unsupported."
      - id: q-06
        type: unanswerable
        question: "Where were the demonstration flights conducted?"
        note: "The excerpt does not state a location. Any place name is fabricated."
      - id: q-07
        type: false_premise
        question: "The demonstration led to a decision to field the system across the entire Apache fleet — when does fielding begin?"
        note: "False premise: the excerpt describes evaluation flights and pilot feedback, not any fielding decision."

  - id: ctx-03
    category: operations
    domain: air
    source:
      outlet: DVIDS
      id: "500473"
      title: "23d Air Task Force Conducts First Deployment Exercise at Fort Bliss"
      url: "https://www.dvidshub.net/news/500473/23d-air-task-force-conducts-first-deployment-exercise-fort-bliss"
    text: |
      More than 200 Airmen from multiple Air Force and joint military
      installations converge to form the 23d Air Task Force (ATF) comprised of
      the Command Echelon, A-Staff, and the 23d Combat Air Base Squadron (CABS)
      to take part in their first expeditionary skills exercise at Fort Bliss
      from June 7 to 19. While training under the 23d ATF at Fort Bliss, Airmen
      with the 23d CABS are learning the support functions needed to establish
      and secure a base in a deployed environment, regardless of their Air Force
      specialty.
    questions:
      - id: q-08
        type: grounded
        question: "How many Airmen took part in the exercise, and where and when was it held?"
        note: "Supported: more than 200 Airmen, at Fort Bliss, from June 7 to 19."
      - id: q-09
        type: partial
        question: "How many Airmen came from each participating installation?"
        note: "The excerpt gives a total (200+) but no per-installation breakdown. Any split is unsupported."
      - id: q-10
        type: unanswerable
        question: "What adversary or threat scenario did the exercise simulate?"
        note: "The excerpt describes base-establishment training but no simulated adversary. Specifics are fabricated."

