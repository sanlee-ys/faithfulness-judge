# Dependabot: automated dependency-update PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# NOTE: this file only enables *version updates* (scheduled PRs). The security
# side — Dependabot alerts + automatic security-fix PRs against the CVE/GHSA
# database — is a repo Settings > Code security toggle (free), not config here.
# Both toggles were turned on for this repo on 2026-07-24; this file adds the
# proactive half so deps get patched on a schedule, not only after a CVE lands.
version: 2
updates:
  # Python deps — uv-managed (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # No "github-actions" block: this repo has no .github/workflows yet, so such
  # a block would scan nothing. Add one when CI lands — a pinned-but-stale
  # action is a real supply-chain surface.
